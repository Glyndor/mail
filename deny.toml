[advisories]
version = 2
# Deny all known vulnerabilities and unmaintained crates.
ignore = []

[licenses]
version = 2
allow = [
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"MIT",
	"MIT-0",
	"BSD-3-Clause",
	"ISC",
	"Unicode-3.0",
	"CC0-1.0",
	"BSL-1.0",
	"CDLA-Permissive-2.0",
	"Unlicense",
	"Zlib",
]
# Confidence threshold for license text matching.
confidence-threshold = 0.8

[bans]
# Warn on duplicate versions of the same crate; deny wildcard dependencies.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
# Only allow crates from crates.io; deny unknown registries and git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
